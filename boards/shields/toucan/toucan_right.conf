CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y

CONFIG_ZMK_BATTERY_REPORTING=y
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Enter deep sleep https://zmk.dev/docs/features/low-power-states
CONFIG_ZMK_SLEEP=y

# 60 minutes before deep sleep — reconnecting BT is painful, power delta is small
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# 30-second idle timeout. The native Pinnacle driver has no ZMK-idle-driven shutdown
# (the geeksville idle sleeper was removed with cirque-input-module), but CONFIG_ZMK_PM_SOFT_OFF
# below still suspends the SPI bus on idle, which reduces system power. To also put the
# Pinnacle itself into sleep mode (~1.7mA vs ~2.9mA active), enable sleep-mode-enable in
# toucan_right.overlay — trades ~1.2mA for a ~300ms first-touch latency after idle.
CONFIG_ZMK_IDLE_TIMEOUT=30000

# Enables PM_DEVICE + ZMK_PM_DEVICE_SUSPEND_RESUME, which suspends the SPI bus on idle
# and enables the SOFT_OFF (deep sleep) feature.
CONFIG_ZMK_PM_SOFT_OFF=y
